version: '3.9'
services:
  mongo:
    image: mongo:7
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
  minio:
    image: minio/minio
    ports: ['9000:9000', '9001:9001']
    environment:
      MINIO_ROOT_USER: mercury
      MINIO_ROOT_PASSWORD: mercury123
    command: server /data --console-address ":9001"
    volumes: ['minio_data:/data']
volumes:
  mongo_data:
  minio_data:
